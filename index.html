<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>English Roleplay · Phrase Library</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #f8fafc;
  --surface: #ffffff;
  --border: #e2e8f0;
  --border-dark: #cbd5e1;
  --text: #0f172a;
  --muted: #475569;
  --muted-light: #94a3b8;
  --accent: #3b82f6;
  --accent-dark: #2563eb;
  --accent-soft: #eff6ff;
  --green: #10b981;
  --green-soft: #ecfdf5;
  --red: #ef4444;
  --red-soft: #fef2f2;
  --amber: #f59e0b;
  --radius-sm: 6px;
  --radius: 12px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.03), 0 1px 3px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.05);
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* top bar */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(8px);
  background: rgba(255,255,255,0.92);
  gap: 12px;
  flex-wrap: wrap;
}
.topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 1rem;
}
.topbar-left span {
  background: linear-gradient(135deg, #1e3a8a, #3b82f6);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
}
.topbar-right {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.btn {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 0.8rem;
  padding: 6px 14px;
  border-radius: 40px;
  border: 1px solid var(--border-dark);
  background: var(--surface);
  cursor: pointer;
  transition: all 0.2s ease;
  color: var(--text);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:hover {
  background: #f1f5f9;
  transform: translateY(-1px);
}
.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.btn-primary:hover {
  background: var(--accent-dark);
}
.btn-sm {
  padding: 5px 12px;
  font-size: 0.75rem;
}

/* hero */
.hero {
  background: linear-gradient(110deg, #0f172a 0%, #1e293b 45%, #2d3a5e 100%);
  color: white;
  padding: 32px 24px 48px;
  text-align: center;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.2rem;
  font-weight: 800;
  letter-spacing: -0.01em;
}
.hero p {
  margin-top: 8px;
  opacity: 0.8;
  font-size: 0.9rem;
}
.page {
  max-width: 1280px;
  margin: 0 auto;
  padding: 32px 24px 64px;
}

/* search panel */
.search-panel {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 8px 16px;
  margin-bottom: 32px;
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
}
.search-wrapper {
  flex: 1;
  position: relative;
}
.search-wrapper input {
  width: 100%;
  padding: 12px 12px 12px 40px;
  border: 1px solid var(--border);
  border-radius: 48px;
  font-size: 0.9rem;
  background: var(--bg);
  transition: all 0.2s;
}
.search-wrapper input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
}
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted-light);
  font-size: 1rem;
}
.control-group {
  display: flex;
  gap: 8px;
}

/* categories grid / accordion */
.categories-grid {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.category-card {
  background: var(--surface);
  border-radius: 20px;
  border: 1px solid var(--border);
  overflow: hidden;
  transition: box-shadow 0.2s;
  box-shadow: var(--shadow-sm);
}
.category-card:hover {
  box-shadow: var(--shadow-md);
}
.category-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  cursor: pointer;
  background: var(--surface);
  transition: background 0.15s;
  gap: 12px;
  flex-wrap: wrap;
}
.category-header:hover {
  background: #fafcff;
}
.cat-left {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 2;
}
.cat-arrow {
  font-size: 0.7rem;
  transition: transform 0.2s;
  color: var(--muted-light);
  width: 22px;
}
.category-card.open .cat-arrow {
  transform: rotate(90deg);
}
.cat-emoji {
  font-size: 1.5rem;
}
.cat-name {
  font-weight: 700;
  font-size: 1.05rem;
}
.cat-badge {
  background: var(--bg);
  padding: 2px 10px;
  border-radius: 40px;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--muted);
}
.cat-actions {
  display: flex;
  gap: 6px;
  opacity: 0.6;
  transition: opacity 0.15s;
}
.category-header:hover .cat-actions {
  opacity: 1;
}
.cat-icon-btn {
  background: none;
  border: none;
  font-size: 1rem;
  padding: 5px;
  cursor: pointer;
  border-radius: 30px;
  width: 30px;
  transition: background 0.1s;
}
.cat-icon-btn:hover {
  background: var(--border);
}
.category-body {
  display: none;
  padding: 4px 20px 20px 20px;
  border-top: 1px solid var(--border);
  background: #ffffff;
}
.category-card.open .category-body {
  display: block;
}

/* phrase table responsive */
.phrase-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.phrase-item {
  background: var(--bg);
  border-radius: 14px;
  padding: 14px 16px;
  transition: all 0.15s;
  border: 1px solid transparent;
}
.phrase-item:hover {
  background: white;
  border-color: var(--border);
  box-shadow: 0 2px 6px rgba(0,0,0,0.02);
}
.phrase-content {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  justify-content: space-between;
  align-items: flex-start;
}
.phrase-texts {
  flex: 3;
  min-width: 200px;
}
.phrase-en {
  font-weight: 700;
  font-size: 0.96rem;
  color: var(--text);
  margin-bottom: 6px;
  word-break: break-word;
}
.phrase-pt {
  font-size: 0.85rem;
  color: var(--muted);
  font-style: normal;
  word-break: break-word;
  border-left: 2px solid var(--border);
  padding-left: 10px;
  margin-top: 4px;
}
.phrase-actions {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
}
.icon-btn {
  background: transparent;
  border: none;
  font-size: 1.1rem;
  width: 34px;
  height: 34px;
  border-radius: 40px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--muted);
}
.icon-btn:hover {
  background: var(--border);
}
.icon-btn.play:hover { background: var(--green-soft); color: var(--green); }
.icon-btn.dl:hover { background: var(--accent-soft); color: var(--accent); }
.icon-btn.del:hover { background: var(--red-soft); color: var(--red); }
.add-phrase-footer {
  margin-top: 16px;
  text-align: left;
  width: 100%;
}
.add-phrase-footer button {
  background: none;
  border: 1px dashed var(--border-dark);
  padding: 8px 14px;
  border-radius: 40px;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--accent);
  cursor: pointer;
  transition: all 0.1s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.add-phrase-footer button:hover {
  background: var(--accent-soft);
  border-color: var(--accent);
}

.empty-cat {
  text-align: center;
  padding: 28px;
  color: var(--muted-light);
  font-style: italic;
}

mark {
  background: #fef9c3;
  border-radius: 8px;
  padding: 0 3px;
  color: #0f172a;
}

/* modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}
.modal-overlay.open {
  display: flex;
}
.modal {
  background: white;
  max-width: 500px;
  width: 90%;
  border-radius: 28px;
  padding: 24px;
  box-shadow: 0 25px 40px rgba(0,0,0,0.2);
  animation: slideUp 0.2s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(14px);}
  to { opacity: 1; transform: translateY(0);}
}
.modal h3 {
  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
}
.form-group {
  margin-bottom: 18px;
}
label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--muted);
  display: block;
  margin-bottom: 6px;
}
input, select, textarea {
  width: 100%;
  padding: 12px 14px;
  border-radius: 16px;
  border: 1px solid var(--border);
  font-family: 'Inter', monospace;
  font-size: 0.9rem;
  background: var(--bg);
  transition: 0.15s;
}
input:focus, select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(59,130,246,0.1);
}
.preview-text {
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 5px;
  font-style: italic;
}
.emoji-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 6px;
}
.emoji-option {
  font-size: 1.5rem;
  cursor: pointer;
  padding: 5px;
  border-radius: 14px;
  transition: all 0.1s;
}
.emoji-option.selected {
  background: var(--accent-soft);
  transform: scale(1.05);
}
.modal-buttons {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 20px;
}
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1e293b;
  color: white;
  padding: 10px 20px;
  border-radius: 60px;
  font-size: 0.85rem;
  z-index: 1100;
  transition: 0.25s;
  opacity: 0;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
@media (max-width: 640px) {
  .topbar { padding: 0 16px; height: auto; }
  .page { padding: 20px 16px; }
  .phrase-content { flex-direction: column; }
  .phrase-actions { align-self: flex-end; }
  .cat-header { flex-direction: column; align-items: flex-start; }
  .toast { white-space: normal; max-width: 85vw; text-align: center; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">🎙️ <span>English Roleplay</span> · Vida Real</div>
  <div class="topbar-right">
    <button class="btn" id="exportBtn">📤 Exportar</button>
    <label class="btn" style="cursor:pointer">📥 Importar <input type="file" accept=".json" id="importFile" style="display:none"></label>
    <button class="btn btn-primary" id="newCatBtn">✨ Nova Categoria</button>
    <button class="btn btn-primary" id="newPhraseTopBtn">+ Nova Frase</button>
  </div>
</div>

<div class="hero">
  <h1>🗣️ Roleplay Real</h1>
  <p>Frases em inglês por situação · ouça · baixe · aprenda com contexto real</p>
</div>

<div class="page">
  <div class="search-panel">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Buscar em inglês ou português...">
    </div>
    <div class="control-group">
      <button class="btn btn-sm" id="expandAllBtn">📂 Abrir tudo</button>
      <button class="btn btn-sm" id="collapseAllBtn">📁 Fechar tudo</button>
    </div>
  </div>
  <div id="categoriesContainer" class="categories-grid"></div>
</div>

<!-- MODAL PHRASE -->
<div id="phraseModal" class="modal-overlay">
  <div class="modal">
    <h3><span id="phraseModalTitle">Nova Frase</span><button class="icon-btn" id="closePhraseModal">✕</button></h3>
    <div class="form-group">
      <label>🇺🇸 Frase em Inglês *</label>
      <input type="text" id="phraseEn" placeholder="ex: Could you help me?" autocomplete="off">
      <div class="preview-text" id="translatePreview">🔮 Tradução automática aparecerá aqui...</div>
    </div>
    <div class="form-group">
      <label>🇧🇷 Tradução em Português</label>
      <input type="text" id="phrasePt" placeholder="Edite ou deixe automático">
    </div>
    <div class="form-group">
      <label>📁 Categoria</label>
      <select id="phraseCat"></select>
    </div>
    <input type="hidden" id="editPhraseId">
    <div class="modal-buttons">
      <button class="btn" id="modalDeleteBtn" style="color:var(--red);border-color:var(--red); margin-right:auto; display:none">🗑 Excluir</button>
      <button class="btn" id="modalCancelBtn">Cancelar</button>
      <button class="btn btn-primary" id="modalSaveBtn">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL CATEGORY -->
<div id="catModal" class="modal-overlay">
  <div class="modal">
    <h3>📂 Nova Categoria <button class="icon-btn" id="closeCatModal">✕</button></h3>
    <div class="form-group">
      <label>Nome da Categoria</label>
      <input type="text" id="catName" placeholder="Ex: No aeroporto, Negócios...">
    </div>
    <div class="form-group">
      <label>Emoji representativo</label>
      <div class="emoji-grid" id="emojiPickerGrid"></div>
    </div>
    <div class="modal-buttons">
      <button class="btn" id="catCancelBtn">Cancelar</button>
      <button class="btn btn-primary" id="catSaveBtn">Criar</button>
    </div>
  </div>
</div>

<div id="toastMsg" class="toast"></div>

<script>
// --------------------- DATA MODEL -------------------------
const EMOJIS_LIST = ['🗣️','✈️','🍽️','🛍️','💼','💬','🗺️','🏨','🏥','🚨','🚌','📚','🏠','😊','📱','🤝','🎉','🏋️','🌍','🎓','🏦','🎭','🏖️','🍕','🎵','💡','🧳','🔑','🌙','☀️','💘','⚡','👔'];

let categories = [];
let phrases = [];
let nextId = 1000;
let openSections = new Set();
let currentSearch = "";

// Helper: load from localStorage
function loadData() {
  const storedCats = localStorage.getItem('rp_cats_v2');
  const storedPhrases = localStorage.getItem('rp_phrases_v2');
  if(storedCats) categories = JSON.parse(storedCats);
  if(storedPhrases) phrases = JSON.parse(storedPhrases);
  if(!categories || categories.length===0) {
    categories = [
      { id: "general", name: "Conversas do Dia a Dia", emoji: "💬" },
      { id: "work_study", name: "Trabalho & Estudos", emoji: "💼" },
      { id: "relationships", name: "Relacionamentos & Social", emoji: "🤝" },
      { id: "health_job", name: "Saúde & Profissão", emoji: "🏥" },
      { id: "random", name: "Frases do Kaiky", emoji: "🎙️" }
    ];
  }
  if(!phrases || phrases.length===0) {
    phrases = [
      // insert roleplay data
      {id:1, en:"I study Software Engineering in college.", pt:"Eu estudo engenharia de software na faculdade.", cat:"work_study"},
      {id:2, en:"I’d like to do mine like that too.", pt:"Eu também gostaria de fazer o meu assim.", cat:"work_study"},
      {id:3, en:"Are you naked? For God’s sake, I’m already tired of seeing dicks today. Let’s just have a normal conversation.", pt:"Você está nu? Pelo amor de Deus, já estou cansado de ver pênis hoje. Vamos ter uma conversa normal.", cat:"random"},
      {id:4, en:"Man, why are you naked?", pt:"Por que você está pelado?", cat:"random"},
      {id:5, en:"In Brazil, my name is Kaiky, but abroad people call me Kaike, Kaique, Kike—I don’t even know. And they also mess up my last name. My last name is Bacio, but they say ‘Brasil’.", pt:"No Brasil, meu nome é Kaiky, mas fora me chamam de Kaike, Kaique, Kike, eu não sei. E também erram meu sobrenome. Meu sobrenome é Bácio, eles falam Brasil.", cat:"random"},
      {id:6, en:"If I make mistakes, please correct me.", pt:"Se eu errar me corrija.", cat:"general"},
      {id:7, en:"I am scared.", pt:"Estou com medo.", cat:"general"},
      {id:8, en:"prove it to me", pt:"prove para mim", cat:"general"},
      {id:9, en:"Prove it to me—I’ll believe it when I see it.", pt:"Prove para mim — só acredito vendo.", cat:"general"},
      {id:10, en:"I work with medical oxygen. I handle oxygen tanks for people who, after years of heavy smoking, can’t breathe on their own and need oxygen. So stop smoking.", pt:"Eu trabalho com oxigênio medicinal para pessoas que, por fumarem demais, não conseguem respirar sozinhas. Então pare de fumar.", cat:"health_job"},
      {id:11, en:"My job helps people breathe better.", pt:"Meu trabalho faz pessoas respirarem melhor.", cat:"health_job"},
      {id:12, en:"I deliver medical oxygen to patients at home, by motorcycle or car.", pt:"Entrego oxigênio medicinal em casa, de moto ou carro.", cat:"health_job"},
      {id:13, en:"I’m in a relationship.", pt:"Estou em um relacionamento.", cat:"relationships"},
      {id:14, en:"I’m dating a 45-year-old woman.", pt:"Estou namorando uma mulher de 45 anos.", cat:"relationships"},
      {id:15, en:"She was my teacher back then.", pt:"Ela era minha professora naquela época.", cat:"relationships"},
      {id:16, en:"We’ve been together for almost five years.", pt:"Estamos juntos há quase cinco anos.", cat:"relationships"},
      {id:17, en:"I’m in a relationship with a 45-year-old woman. She’s 22 years older than me. We met when I was in high school—she was my teacher back then. We’ve been together for almost five years, and we’re doing really well.", pt:"Estou num relacionamento com uma mulher de 45 anos. Ela é 22 anos mais velha. Nos conhecemos no ensino médio — era minha professora. Estamos juntos há quase cinco anos e nos damos muito bem.", cat:"relationships"},
      {id:18, en:"I study Software Engineering at USF.", pt:"Estudo Engenharia de Software na USF.", cat:"work_study"},
      {id:19, en:"I’m in my third semester. We learn how to build websites, apps, and even operating systems.", pt:"Estou no terceiro semestre. Aprendemos a construir sites, apps e até sistemas operacionais.", cat:"work_study"},
      {id:20, en:"I’m studying object-oriented programming and some other boring stuff.", pt:"Estou estudando programação orientada a objetos e outras coisas chatas.", cat:"work_study"},
      {id:21, en:"Your hair is similar to mine.", pt:"Seu cabelo é parecido com o meu.", cat:"general"},
      {id:22, en:"President Trump is an asshole. He reminds me of the Antichrist.", pt:"Presidente Trump é um desgraçado. Ele me lembra o anticristo.", cat:"random"},
      {id:23, en:"I’m not an atheist, but I don’t follow any religion. I believe in God, that’s it.", pt:"Eu não sou ateu, mas não sigo religião. Eu acredito em Deus e só.", cat:"general"},
      {id:24, en:"This is a secret, okay? Don’t tell anyone. You’re not recording this, are you?", pt:"Isso é um segredo, ok? Não conte para ninguém. Você não está gravando isso, está?", cat:"general"},
      {id:25, en:"How did you get there?", pt:"Como você chegou aí?", cat:"general"},
      {id:26, en:"Where were you born?", pt:"Onde você nasceu?", cat:"general"},
      {id:27, en:"What is your country like?", pt:"Como é o seu país?", cat:"general"},
      {id:28, en:"Are you hitting on me? I already have a girlfriend.", pt:"Você está dando em cima de mim? Eu já tenho namorada.", cat:"relationships"},
      {id:29, en:"If you want to hit on me, at least buy me a burger first.", pt:"Quer dar em cima de mim? Primeiro me paga um hambúrguer.", cat:"relationships"},
      {id:30, en:"You there, hiding—let me see you.", pt:"Você aí escondido — deixa eu te ver.", cat:"general"},
      {id:31, en:"Your video is lagging.", pt:"Seu vídeo está travando.", cat:"general"},
      {id:32, en:"What brings you here—chatting, meeting new people, or just bored?", pt:"O que te traz aqui — bater papo, conhecer gente nova ou só tédio?", cat:"general"},
    ];
  }
  nextId = Math.max(...phrases.map(p=>p.id), 0) + 1;
  categories.forEach(c => openSections.add(c.id));
  persist();
}

function persist() {
  localStorage.setItem('rp_cats_v2', JSON.stringify(categories));
  localStorage.setItem('rp_phrases_v2', JSON.stringify(phrases));
}

let translateTimeout = null;
async function autoTranslate(text) {
  if(!text || text.trim().length<2) return "";
  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=pt&dt=t&q=${encodeURIComponent(text)}`;
    const res = await fetch(url);
    const data = await res.json();
    return data[0]?.map(x=>x[0]).join('') || "";
  } catch{ return ""; }
}

function triggerAutoTranslate() {
  const enInput = document.getElementById('phraseEn');
  const preview = document.getElementById('translatePreview');
  const val = enInput.value;
  if(!val.trim()){ preview.innerHTML = "🔮 Tradução automática..."; return; }
  preview.innerHTML = "🌀 traduzindo...";
  clearTimeout(translateTimeout);
  translateTimeout = setTimeout(async () => {
    const translated = await autoTranslate(val);
    if(translated) {
      preview.innerHTML = `🇧🇷 ${translated}`;
      const ptField = document.getElementById('phrasePt');
      if(!ptField.dataset.manual) ptField.value = translated;
    } else { preview.innerHTML = "⚠️ não foi possível traduzir"; }
  }, 500);
}

// render core
function render() {
  const container = document.getElementById('categoriesContainer');
  const search = currentSearch.toLowerCase().trim();
  let html = "";
  for(let cat of categories) {
    let catPhrases = phrases.filter(p=>p.cat === cat.id);
    let filtered = search ? catPhrases.filter(p=>p.en.toLowerCase().includes(search) || p.pt.toLowerCase().includes(search)) : catPhrases;
    const isOpen = search ? filtered.length>0 : openSections.has(cat.id);
    const openClass = isOpen ? "open" : "";
    html += `<div class="category-card ${openClass}" data-catid="${cat.id}">
      <div class="category-header" onclick="toggleSection('${cat.id}')">
        <div class="cat-left">
          <span class="cat-arrow">▶</span>
          <span class="cat-emoji">${cat.emoji || '📁'}</span>
          <span class="cat-name">${escapeHtml(cat.name)}</span>
          <span class="cat-badge">${filtered.length}</span>
        </div>
        <div class="cat-actions" onclick="event.stopPropagation()">
          <button class="cat-icon-btn" onclick="openAddPhraseWithCat('${cat.id}')" title="Adicionar frase">+</button>
          <button class="cat-icon-btn" onclick="deleteCategoryPrompt('${cat.id}')" title="Remover categoria">🗑</button>
        </div>
      </div>
      <div class="category-body">
        <div class="phrase-list" id="phrases-${cat.id}">`;

    if(filtered.length===0){
      html += `<div class="empty-cat">✨ Nenhuma frase — clique + para adicionar</div>`;
    } else {
      for(let p of filtered){
        const enHighlight = search ? highlightText(p.en,search) : escapeHtml(p.en);
        const ptHighlight = search ? highlightText(p.pt,search) : escapeHtml(p.pt);
        html += `<div class="phrase-item" data-pid="${p.id}">
          <div class="phrase-content">
            <div class="phrase-texts">
              <div class="phrase-en">${enHighlight}</div>
              <div class="phrase-pt">${ptHighlight}</div>
            </div>
            <div class="phrase-actions">
              <button class="icon-btn play" onclick="speakPhrase(${p.id})">🔊</button>
              <button class="icon-btn dl" onclick="downloadAudio(${p.id})">⬇️</button>
              <button class="icon-btn" onclick="editPhrase(${p.id})">✏️</button>
              <button class="icon-btn del" onclick="deletePhraseQuick(${p.id})">🗑</button>
            </div>
          </div>
        </div>`;
      }
    }
    html += `<div class="add-phrase-footer"><button onclick="openAddPhraseWithCat('${cat.id}')">➕ Adicionar frase em ${cat.name}</button></div>
        </div>
      </div>
    </div>`;
  }
  container.innerHTML = html;
}

window.toggleSection = function(id){
  if(openSections.has(id)) openSections.delete(id);
  else openSections.add(id);
  render();
}

function escapeHtml(str){ return String(str).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}
function highlightText(text, query){ const escText = escapeHtml(text); const escQ = query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); return escText.replace(new RegExp(`(${escQ})`,'gi'),'<mark>$1</mark>'); }

// Audio & download
let currentUtterance = null;
function speakPhrase(id){
  const phrase = phrases.find(p=>p.id===id);
  if(!phrase) return;
  if(currentUtterance) window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(phrase.en);
  utter.lang='en-US'; utter.rate=0.9;
  window.speechSynthesis.speak(utter);
  currentUtterance = utter;
  showToast(`🔊 Speaking: ${phrase.en.substring(0,50)}`);
}
function downloadAudio(id){
  const phrase = phrases.find(p=>p.id===id);
  if(!phrase) return;
  const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(phrase.en)}&tl=en&client=tw-ob`;
  const a = document.createElement('a'); a.href=url; a.download = `phrase_${id}.mp3`; a.click();
  showToast("⬇️ Download iniciado");
}

// modal phrase logic
let currentEditId = null;
function openAddPhraseWithCat(catId){
  currentEditId = null;
  document.getElementById('phraseModalTitle').innerText = "📝 Nova Frase";
  document.getElementById('phraseEn').value = "";
  document.getElementById('phrasePt').value = "";
  document.getElementById('translatePreview').innerHTML = "🔮 Tradução automática...";
  document.getElementById('editPhraseId').value = "";
  document.getElementById('modalDeleteBtn').style.display = "none";
  populateCatSelect(catId);
  document.getElementById('phraseModal').classList.add('open');
  document.getElementById('phraseEn').focus();
  delete document.getElementById('phrasePt').dataset.manual;
}

function editPhrase(id){
  const p = phrases.find(x=>x.id===id);
  if(!p) return;
  currentEditId = id;
  document.getElementById('phraseModalTitle').innerText = "✏️ Editar Frase";
  document.getElementById('phraseEn').value = p.en;
  document.getElementById('phrasePt').value = p.pt;
  document.getElementById('translatePreview').innerHTML = "";
  document.getElementById('editPhraseId').value = id;
  document.getElementById('modalDeleteBtn').style.display = "inline-flex";
  populateCatSelect(p.cat);
  document.getElementById('phraseModal').classList.add('open');
  document.getElementById('phrasePt').dataset.manual = '1';
}

function populateCatSelect(selectedId){
  const select = document.getElementById('phraseCat');
  select.innerHTML = categories.map(c=>`<option value="${c.id}" ${c.id===selectedId ? 'selected' : ''}>${c.emoji} ${c.name}</option>`).join('');
}

async function savePhraseModal(){
  const en = document.getElementById('phraseEn').value.trim();
  const pt = document.getElementById('phrasePt').value.trim();
  const cat = document.getElementById('phraseCat').value;
  const editId = document.getElementById('editPhraseId').value;
  if(!en){ showToast("⚠️ Frase em inglês obrigatória"); return; }
  let finalPt = pt;
  if(!finalPt){
    finalPt = await autoTranslate(en);
  }
  if(editId){
    const idx = phrases.findIndex(p=>p.id==editId);
    if(idx!==-1) phrases[idx] = {...phrases[idx], en, pt:finalPt||pt, cat};
  } else {
    phrases.push({ id: nextId++, en, pt: finalPt || pt, cat });
  }
  persist(); render(); closeModals(); showToast(editId?"✅ atualizada":"✅ adicionada!");
}

function deletePhraseQuick(id){
  if(confirm("Excluir esta frase?")){
    phrases = phrases.filter(p=>p.id!==id);
    persist(); render(); showToast("🗑 Removida");
  }
}
function modalDeleteHandler(){
  const id = document.getElementById('editPhraseId').value;
  if(id && confirm("Remover permanentemente?")){
    phrases = phrases.filter(p=>p.id!=id);
    persist(); render(); closeModals(); showToast("🗑 Frase excluída");
  }
}

// Category logic
let selectedEmoji = "📁";
function openCatModal(){
  selectedEmoji = EMOJIS_LIST[0];
  renderEmojiPicker();
  document.getElementById('catName').value = "";
  document.getElementById('catModal').classList.add('open');
}
function renderEmojiPicker(){
  const grid = document.getElementById('emojiPickerGrid');
  grid.innerHTML = EMOJIS_LIST.map(e => `<span class="emoji-option ${e===selectedEmoji ? 'selected':''}" onclick="selectEmoji('${e}')">${e}</span>`).join('');
}
window.selectEmoji = function(emoji){ selectedEmoji = emoji; renderEmojiPicker(); };
function saveCategory(){
  const name = document.getElementById('catName').value.trim();
  if(!name){ showToast("Nome da categoria"); return; }
  const id = name.toLowerCase().replace(/[^a-z0-9]/g,'-') + "-"+Date.now();
  categories.push({ id, name, emoji: selectedEmoji });
  openSections.add(id);
  persist(); render(); closeModals(); showToast("📁 Categoria criada");
}
function deleteCategoryPrompt(id){
  const cat = categories.find(c=>c.id===id);
  const count = phrases.filter(p=>p.cat===id).length;
  if(confirm(`Excluir "${cat?.name}" e suas ${count} frase(s)?`)){
    categories = categories.filter(c=>c.id!==id);
    phrases = phrases.filter(p=>p.cat!==id);
    openSections.delete(id);
    persist(); render(); showToast("🗑 Categoria removida");
  }
}

// search, expand, collapse
function handleSearch(){ currentSearch = document.getElementById('searchInput').value; render(); }
function expandAll(){ categories.forEach(c=>openSections.add(c.id)); render(); }
function collapseAll(){ openSections.clear(); render(); }

function exportData(){
  const data = JSON.stringify({categories, phrases},null,2);
  const blob = new Blob([data],{type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download="english_roleplay.json"; a.click(); showToast("📦 Exportado");
}
function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try{
      const json = JSON.parse(ev.target.result);
      if(json.categories) categories = json.categories;
      if(json.phrases) { json.phrases.forEach(p=>{ if(!phrases.find(x=>x.en===p.en)) phrases.push({...p, id:nextId++}); }); }
      persist(); render(); showToast("✅ Importado");
    }catch{ showToast("Arquivo inválido");}
  };
  reader.readAsText(file);
}
function showToast(msg){
  const toast = document.getElementById('toastMsg');
  toast.innerText = msg; toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),2500);
}
function closeModals(){ document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('open')); }

// init event listeners
document.getElementById('searchInput').addEventListener('input', handleSearch);
document.getElementById('expandAllBtn').addEventListener('click', expandAll);
document.getElementById('collapseAllBtn').addEventListener('click', collapseAll);
document.getElementById('exportBtn').addEventListener('click', exportData);
document.getElementById('importFile').addEventListener('change', importData);
document.getElementById('newCatBtn').addEventListener('click', openCatModal);
document.getElementById('newPhraseTopBtn').addEventListener('click', ()=>openAddPhraseWithCat(categories[0]?.id||'general'));
document.getElementById('closePhraseModal').addEventListener('click', closeModals);
document.getElementById('modalCancelBtn').addEventListener('click', closeModals);
document.getElementById('modalSaveBtn').addEventListener('click', savePhraseModal);
document.getElementById('modalDeleteBtn').addEventListener('click', modalDeleteHandler);
document.getElementById('closeCatModal').addEventListener('click', closeModals);
document.getElementById('catCancelBtn').addEventListener('click', closeModals);
document.getElementById('catSaveBtn').addEventListener('click', saveCategory);
document.getElementById('phraseEn').addEventListener('input', triggerAutoTranslate);
document.getElementById('phrasePt').addEventListener('input', function(){ this.dataset.manual='1'; });

loadData();
render();
</script>
</body>
</html>
